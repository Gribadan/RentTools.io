<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="RentTools">
  <!-- Coral brand square. The 120px corner radius matches the iOS / Android
       home-screen mask treatment so the icon looks intentional everywhere
       (rounded on iOS, rounded clipped on Android, full square in browsers
       that use the SVG as-is). -->
  <rect width="512" height="512" rx="120" fill="#ff385c"/>
  <!-- Three stay-bars echo the booking pills on the marketing hero. Three
       white pills against the coral square is a strong silhouette down to
       16×16; the staggered widths + insets give it a distinct shape so the
       favicon doesn't blur into a generic coloured tile in browser tabs. -->
  <rect x="128" y="168" width="256" height="56" rx="22" fill="white"/>
  <rect x="172" y="248" width="208" height="56" rx="22" fill="white" opacity="0.85"/>
  <rect x="128" y="328" width="232" height="56" rx="22" fill="white" opacity="0.7"/>
</svg>
