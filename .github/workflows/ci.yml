name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + tests
    runs-on: ubuntu-latest

    env:
      # Module-level Prisma init in src/lib/prisma.ts requires *some* DB env.
      # No queries are executed during `next build` or `vitest run`, so a
      # local SQLite path that never has to exist is sufficient and keeps
      # CI hermetic — no secrets, no Turso, no Gemini.
      DATABASE_URL: "file:./ci-build.db"
      JWT_SECRET: "ci-only-not-a-real-secret-just-for-build-pass"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check + production build
        run: npx next build

      - name: Unit tests
        run: npx vitest run
