# /etc/nginx/sites-available/rent-tool.conf
# Symlink: ln -sf /etc/nginx/sites-available/rent-tool.conf /etc/nginx/sites-enabled/
#
# This config terminates TLS at the origin even when Cloudflare proxies traffic
# (CF SSL/TLS mode "Full (strict)" requires the origin to present a valid cert).

# Redirect HTTP → HTTPS for any domain
server {
    listen 80;
    listen [::]:80;
    server_name renttools.io www.renttools.io staging.renttools.io;
    return 301 https://$host$request_uri;
}

# Apex + www on HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name renttools.io www.renttools.io;

    # Let's Encrypt cert covers all three names (apex, www, staging) — same cert used below
    ssl_certificate     /etc/letsencrypt/live/renttools.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renttools.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — once you're confident HTTPS works, uncomment to enforce
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20M;  # passport scans can be large PDFs

    # Real client IP — for our middleware/rate-limit logger.
    # Cloudflare's IP ranges (https://www.cloudflare.com/ips-v4) — when proxied,
    # nginx sees CF's IP and recovers the real client IP from CF-Connecting-IP.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Static assets — let Next.js serve them; nginx just proxies
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health endpoint — short timeout for monitors
    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        access_log off;
    }

    # Calendar feeds — public iCal endpoint
    location ~ ^/api/calendar/feed/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    gzip on;
    gzip_types text/plain application/json text/calendar application/javascript text/css;
    gzip_min_length 256;
}

# Staging — same cert (multi-name LE cert), different server_name
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.renttools.io;

    ssl_certificate     /etc/letsencrypt/live/renttools.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renttools.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
