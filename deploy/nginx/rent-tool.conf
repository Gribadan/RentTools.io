# /etc/nginx/sites-available/rent-tool.conf
# Symlink: ln -sf /etc/nginx/sites-available/rent-tool.conf /etc/nginx/sites-enabled/
#
# Initial setup: HTTP only on port 80 — Let's Encrypt's certbot --nginx command
# will automatically rewrite this file to add the 443 server block + redirect
# from HTTP to HTTPS.

# Apex + www
server {
    listen 80;
    listen [::]:80;
    server_name renttools.io www.renttools.io;

    client_max_body_size 20M;  # passport scans can be large PDFs

    # Real client IP for our middleware/rate-limit logger
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;

    # Static assets — let Next.js serve them; nginx just proxies
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer tiny responses, stream larger ones
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # Health endpoint — short timeout for monitors
    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        access_log off;  # don't pollute access logs with monitor pings
    }

    # Calendar feeds — no auth, public iCal endpoint
    # Slightly tighter timeouts since these should be fast
    location ~ ^/api/calendar/feed/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;

        # Cache feeds at the edge for 60 seconds — Airbnb/Booking poll these
        # every few minutes anyway, no need to compute on every request
        proxy_cache_valid 200 60s;
    }

    # gzip — reduce bandwidth (Next does this for static; nginx for API too)
    gzip on;
    gzip_types text/plain application/json text/calendar application/javascript text/css;
    gzip_min_length 256;
}

# Staging subdomain — same backend, useful for testing during migration
server {
    listen 80;
    listen [::]:80;
    server_name staging.renttools.io;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
