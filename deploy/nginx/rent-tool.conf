# /etc/nginx/sites-available/rent-tool.conf
# Symlink: ln -sf /etc/nginx/sites-available/rent-tool.conf /etc/nginx/sites-enabled/
#
# This config terminates TLS at the origin even when Cloudflare proxies traffic
# (CF SSL/TLS mode "Full (strict)" requires the origin to present a valid cert).

# Redirect HTTP → HTTPS for any domain
server {
    listen 80;
    listen [::]:80;
    server_name renttools.io www.renttools.io staging.renttools.io;
    return 301 https://$host$request_uri;
}

# Apex + www on HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name renttools.io www.renttools.io;

    # Let's Encrypt cert covers all three names (apex, www, staging) — same cert used below
    ssl_certificate     /etc/letsencrypt/live/renttools.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renttools.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — once you're confident HTTPS works, uncomment to enforce
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content-Security-Policy (RT-21.2). Mirrors next.config.ts so a request
    # served straight from Next gets the same policy as one through nginx.
    # Update both files in lockstep when adding a new external script/style/
    # connect target. `'unsafe-inline'` on script-src is a pragmatic concession
    # for Next 16 hydration + JSON-LD blocks; the rest of the directives still
    # block clickjacking, form exfiltration, and untrusted connect-src.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://accounts.google.com https://*.googleapis.com https://*.ingest.sentry.io https://*.sentry.io; frame-src 'self' https://accounts.google.com; frame-ancestors 'none'; form-action 'self' https://accounts.google.com; upgrade-insecure-requests" always;

    client_max_body_size 20M;  # passport scans can be large PDFs

    # Real client IP — for our middleware/rate-limit logger.
    # Cloudflare's IP ranges (https://www.cloudflare.com/ips-v4) — when proxied,
    # nginx sees CF's IP and recovers the real client IP from CF-Connecting-IP.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Maintenance page — served whenever the upstream Next.js process is unreachable
    # (deploy restart window, OOM, crash). proxy_intercept_errors lets us catch
    # 502/503/504 from the upstream and substitute our branded HTML instead of
    # nginx's default error page.
    proxy_intercept_errors on;
    error_page 502 503 504 = @maintenance;

    location @maintenance {
        root /etc/nginx/html;
        rewrite ^.*$ /maintenance.html break;
        # 503 (Service Unavailable) is the semantically correct response —
        # search engines and monitors know it's temporary, unlike 500.
        add_header Retry-After 30 always;
        add_header Cache-Control "no-store" always;
        return 503 ;
    }

    # Static assets — let Next.js serve them; nginx just proxies
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Smooth out the deploy-restart window: if the upstream is briefly
        # unreachable, retry once after 200ms before falling through to the
        # maintenance page. Buys ~10s of cushion during a clean restart.
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # Health endpoint — short timeout for monitors. Bypasses maintenance page
    # so BetterStack/uptime checks still see the real 5xx during an outage
    # (otherwise we'd hide actual problems behind the friendly 503).
    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_intercept_errors off;
        access_log off;
    }

    # Calendar feeds — public iCal endpoint
    location ~ ^/api/calendar/feed/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    gzip on;
    # nginx already gzips text/html by default; don't list it here (duplicate warning)
    gzip_types text/plain application/json text/calendar application/javascript text/css;
    gzip_min_length 256;
}

# Staging — same cert (multi-name LE cert), different server_name
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.renttools.io;

    ssl_certificate     /etc/letsencrypt/live/renttools.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renttools.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
